name: HIPAA
framework_name: HIPAA
version: "2.0"
description: "Health Insurance Portability and Accountability Act"
controls:
  - id: "164.312_a_1"
    title: User Access Control
    description: Implement user access management
    criticality: critical
    tags:
      - phi_protection
      - access_control
    evidence_required:
      - access_policy
      - audit_logs
  - id: "164.312_a_2_i"
    title: Emergency Access Procedures
    description: Emergency procedures for accessing PHI
    criticality: high
    tags:
      - emergency_procedures
      - phi_protection
    evidence_required:
      - emergency_policy
      - test_results
audit_requirements:
  - id: annual_risk_assessment
    description: Annual HIPAA Risk Assessment
    frequency: annual
    responsible_role: security_officer
evidence_mapping:
  "164.312_a_1":
    - policy
    - logs
  "164.312_a_2_i":
    - policy
    - test_results
